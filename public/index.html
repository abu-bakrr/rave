<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rave - Watch</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.1.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <!-- Окно ввода имени -->
    <div id="name-prompt" class="overlay-screen">
        <div class="prompt-card">
            <h1>Добро пожаловать</h1>
            <p>Представьтесь, чтобы другие знали, кто с ними смотрит</p>
            <input type="text" id="user-name-input" placeholder="Как вас зовут?">
            <button id="save-name-btn" class="primary-btn">Войти</button>
        </div>
    </div>

    <!-- Кнопка «Войти» (для разблокировки звука) -->
    <div id="join-overlay" class="overlay-screen" style="display: none;">
        <div class="prompt-card">
            <h1>Комната готова</h1>
            <p>Нажмите для входа и синхронизации звука</p>
            <button id="join-btn" class="primary-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Присоединиться к просмотру
            </button>
        </div>
    </div>

    <div class="main-layout" id="app-container">
        <!-- Левая часть: Видео -->
        <div class="content-area">
            <div class="video-wrapper" id="video-wrapper">
                <video id="main-video" preload="auto" playsinline webkit-playsinline disableRemotePlayback x-webkit-airplay="deny">
                    Ваш браузер не поддерживает видео.
                </video>
                <div id="yt-container" style="display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 5;">
                    <div id="yt-player"></div>
                </div>
                <div class="video-click-shield"></div>
                <div id="status-overlay" class="status-indicator">Подключение...</div>
                
                <!-- Кастомное управление для гостей -->
                <div class="guest-controls guest-only">
                    <button id="fs-btn" class="custom-fs-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                        <span>На весь экран</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Правая часть: Сайдбар -->
        <aside class="sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-tab="chat-tab">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    Чат
                </button>
                <button class="tab-btn" data-tab="participants-tab">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    Зрители (<span id="participant-count">0</span>)
                </button>
            </div>

            <!-- Вкладка Чата -->
            <div id="chat-tab" class="sidebar-content active">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Написать сообщение...">
                    <button id="send-chat-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>

            <!-- Вкладка Участников -->
            <div id="participants-tab" class="sidebar-content">
                <div class="participants-header">
                    <span>Кто в комнате</span>
                    <button id="reset-session-btn" class="secondary-btn">Сброс</button>
                </div>
                <div class="participants-list" id="user-list"></div>
            </div>

            <!-- Управление (только для админа) -->
            <div class="admin-only admin-controls-section">
                <!-- YouTube / Прямая ссылка -->
                <div class="input-row">
                    <input type="text" id="video-url" placeholder="Прямая ссылка или YouTube">
                    <button id="load-url-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                </div>

                <!-- Поиск фильмов -->
                <div style="margin-top: 12px;">
                    <div class="input-row">
                        <input type="text" id="movie-search-input" placeholder="🔍 Поиск фильмов...">
                        <button id="movie-search-btn" class="icon-btn">
                            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        </button>
                    </div>
                    <div id="movie-results" style="margin-top: 10px; max-height: 250px; overflow-y: auto; padding-right: 4px;"></div>
                </div>
            </div>
            
            <!-- Блок приглашения друзей -->
            <div class="invite-section">
                <p>Позвать друзей:</p>
                <div class="input-row" style="margin:0;">
                    <input type="text" id="invite-url" readonly>
                    <button id="copy-invite-btn" class="secondary-btn" style="background: rgba(255,255,255,0.1); border-color: transparent;">Копировать</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="/script.js?v=6"></script>
</body>
</html>
